name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest
